name: C CI (AVL AeroSoft)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install GCC
      run: sudo apt-get update && sudo apt-get install -y gcc

    - name: Compile
      run: gcc main.c -o aerosoft

    - name: Run tests
      run: |
        echo "find SVO" | ./aerosoft airports.txt
        echo "add ZZZ:Test Airport" | ./aerosoft airports.txt
        echo "delete ZZZ" | ./aerosoft airports.txt
